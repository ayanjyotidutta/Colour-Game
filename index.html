<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromaGuess</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spectrum-slider {
            -webkit-appearance: none;
            background: linear-gradient(to right, red, #ff0, lime, cyan, blue, #f0f, red);
            height: 12px;
            border-radius: 6px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px; width: 20px; border-radius: 50%; background: white; cursor: pointer; border: 2px solid black;
        }
    </style>
</head>
<body class="bg-zinc-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const hslToRgb = (h, s, l) => {
            s /= 100; l /= 100;
            const k = n => (n + h / 30) % 12;
            const a = s * Math.min(l, 1 - l);
            const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, 9 - k(n), 1));
            return [255 * f(0), 255 * f(8), 255 * f(4)];
        };

        const calculateScore = (targetHsl, guessHsl) => {
            const [r1, g1, b1] = hslToRgb(...targetHsl);
            const [r2, g2, b2] = hslToRgb(...guessHsl);
            const distance = Math.sqrt(Math.pow(r1 - r2, 2) + Math.pow(g1 - g2, 2) + Math.pow(b1 - b2, 2));
            const score = Math.max(0, 10 - (distance / 441.67) * 10);
            return parseFloat(score.toFixed(2));
        };

        const generateColor = (round) => {
            const h = Math.floor(Math.random() * 360);
            let s, l;
            if (round === 1) { s = 90; l = 50; }
            else if (round === 2) { s = 70; l = 50; }
            else if (round === 3) { s = 20; l = 85; }
            else if (round === 4) { s = 30; l = 30; }
            else { s = 10; l = 15; }
            return [h, s, l];
        };

        function ColorGame() {
            const [round, setRound] = useState(1);
            const [stage, setStage] = useState('start');
            const [targetColor, setTargetColor] = useState([0, 0, 0]);
            const [guessColor, setGuessColor] = useState([180, 50, 50]);
            const [scores, setScores] = useState([]);
            const [timer, setTimer] = useState(5);
            const timerRef = useRef(null);

            const startRound = () => {
                const newColor = generateColor(round);
                setTargetColor(newColor);
                setGuessColor([180, 50, 50]);
                setStage('memorize');
                setTimer(5);
            };

            useEffect(() => {
                if ((stage === 'memorize' || stage === 'guess') && timer > 0) {
                    timerRef.current = setTimeout(() => setTimer(timer - 1), 1000);
                } else if (stage === 'memorize' && timer === 0) {
                    setStage('guess');
                    setTimer(60);
                } else if (stage === 'guess' && timer === 0) {
                    handleCalculate();
                }
                return () => clearTimeout(timerRef.current);
            }, [stage, timer]);

            const handleCalculate = () => {
                const roundScore = calculateScore(targetColor, guessColor);
                setScores([...scores, roundScore]);
                setStage('result');
            };

            const nextStep = () => {
                if (round < 5) {
                    setRound(round + 1);
                    setStage('memorize');
                    setTargetColor(generateColor(round + 1));
                    setTimer(5);
                } else {
                    setStage('final');
                }
            };

            if (stage === 'start') return (
                <div className="flex flex-col items-center justify-center h-screen text-white text-center">
                    <h1 className="text-5xl font-bold mb-4">ChromaGuess</h1>
                    <button onClick={startRound} className="px-8 py-3 bg-white text-black font-bold rounded-full">START GAME</button>
                </div>
            );

            if (stage === 'memorize') return (
                <div className="h-screen w-full flex items-center justify-center" style={{ backgroundColor: `hsl(${targetColor[0]}, ${targetColor[1]}%, ${targetColor[2]}%)` }}>
                    <div className="bg-black/20 backdrop-blur-md px-10 py-6 rounded-3xl">
                        <span className="text-7xl font-black text-white">{timer}</span>
                    </div>
                </div>
            );

            if (stage === 'guess') return (
                <div className="h-screen bg-zinc-900 text-white flex flex-col">
                    <div className="p-4 flex justify-between items-center border-b border-zinc-800">
                        <span>ROUND {round}/5</span>
                        <span className="font-mono text-xl">{timer}s</span>
                        <button onClick={handleCalculate} className="bg-white text-black px-4 py-1 rounded font-bold">SUBMIT</button>
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center p-6 gap-8">
                        <div className="w-64 h-64 rounded-2xl border-4 border-zinc-800" style={{ backgroundColor: `hsl(${guessColor[0]}, ${guessColor[1]}%, ${guessColor[2]}%)` }} />
                        <div className="w-full max-w-md space-y-6">
                            <input type="range" min="0" max="360" value={guessColor[0]} onChange={(e) => setGuessColor([parseInt(e.target.value), guessColor[1], guessColor[2]])} className="w-full spectrum-slider" />
                            <input type="range" min="0" max="100" value={guessColor[1]} onChange={(e) => setGuessColor([guessColor[0], parseInt(e.target.value), guessColor[2]])} className="w-full" />
                            <input type="range" min="0" max="100" value={guessColor[2]} onChange={(e) => setGuessColor([guessColor[0], guessColor[1], parseInt(e.target.value)])} className="w-full" />
                        </div>
                    </div>
                </div>
            );

            if (stage === 'result') return (
                <div className="h-screen flex flex-col bg-zinc-950 relative">
                    <div className="flex-1 w-full" style={{ backgroundColor: `hsl(${targetColor[0]}, ${targetColor[1]}%, ${targetColor[2]}%)` }} />
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white text-black w-24 h-24 rounded-full flex items-center justify-center shadow-2xl border-4 border-zinc-950 z-10">
                        <span className="text-xl font-black">{scores[scores.length - 1]}</span>
                    </div>
                    <div className="flex-1 w-full" style={{ backgroundColor: `hsl(${guessColor[0]}, ${guessColor[1]}%, ${guessColor[2]}%)` }} />
                    <button onClick={nextStep} className="absolute bottom-10 left-1/2 -translate-x-1/2 bg-white text-black px-12 py-3 rounded-full font-bold z-10">NEXT</button>
                </div>
            );

            if (stage === 'final') {
                const total = scores.reduce((a, b) => a + b, 0).toFixed(2);
                return (
                    <div className="h-screen bg-zinc-900 text-white p-8 flex flex-col items-center justify-center">
                        <div className="text-8xl font-black mb-2">{total}</div>
                        <div className="text-2xl font-bold mb-10 text-blue-400">{total >= 40 ? 'EXCELLENT' : total >= 30 ? 'GOOD' : 'BAD'}</div>
                        <button onClick={() => window.location.reload()} className="px-8 py-3 bg-white text-black font-bold rounded-full">PLAY AGAIN</button>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ColorGame />);
    </script>
</body>
</html>
